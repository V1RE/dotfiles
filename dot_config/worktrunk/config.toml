worktree-path = "{{ repo_path }}/../{{ repo }}.{{ branch | sanitize }}"

[post-switch]
wezterm = "~/.config/worktrunk/hooks/wezterm-create.sh {{ repo }} {{ branch }} {{ worktree_path }}"
graphite = "~/.config/worktrunk/hooks/graphite-create.sh {{ repo }} {{ branch }} {{ worktree_path }}"

[pre-remove]
wezterm = "~/.config/worktrunk/hooks/wezterm-remove.sh {{ repo }} {{ branch }}"

[commit.generation]
command = "opencode run -m github-copilot/claude-haiku-4.5"

[list]
summary = true

[switch]
cd = false
