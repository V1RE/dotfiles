#:schema https://mise.jdx.dev/schema/mise.json

[tools]
"cargo:worktrunk" = "latest"
"github:can1357/oh-my-pi" = "latest"
"github:code-yeongyu/go-claude-code-comment-checker" = "latest"
"github:googleworkspace/cli" = "latest"
"npm:@fsouza/prettierd" = "latest"
"npm:@opencode-ai/cli" = "next"
"npm:agent-browser" = "latest"
"npm:codemogger" = "latest"
"npm:eas-cli" = "latest"
"npm:fallow" = "latest"
"npm:kimaki" = "latest"
"npm:knip" = "latest"
"npm:neovim" = "latest"
"npm:ocx" = "latest"
"npm:opensrc" = "latest"
"npm:playwriter" = "latest"
"npm:poke" = "latest"
"npm:skills" = "latest"
"npm:taze" = "19.12.0"
"npm:trash-cli" = "latest"
"npm:turbo" = "latest"
"npm:wrangler" = "latest"
"npm:zele" = "latest"
aube = "latest"
bun = "latest"
codex = "latest"
graphite = "latest"
hcloud = "latest"
java = "latest"
lazygit = "latest"
node = "24"
nub = "latest"
pi = "latest"
pitchfork = "latest"
pnpm = "latest"
usage = "latest"
uv = "latest"
vercel = "latest"

[settings]
color_theme = "catppuccin"
experimental = true
idiomatic_version_file_enable_tools = ["node"]
minimum_release_age = "0"
trusted_config_paths = ["~/Code/"]

[settings.npm]
package_manager = "auto"

[settings.cargo]
binstall = true

[settings.pipx]
uvx = true

[bootstrap.packages]
"brew-cask:1password" = "latest"
"brew:herdr" = "latest"
"brew:mas" = "latest"
"mas:497799835" = "latest" # Xcode

[bootstrap.user]
login_shell = "/bin/zsh"

[bootstrap.mise_shell_activate]
zprofile = "shims"
zshrc = "activate"
bash_profile = "shims"
bashrc = "activate"
fish = "activate"

[bootstrap.macos.dock]
autohide = true
orientation = "bottom"
show_recents = false
magnification = true
mru_spaces = false

# Dock sizes are stored as floats by macOS; the friendly fields only accept integers.
[bootstrap.macos.defaults."com.apple.dock"]
tilesize = 48.0
largesize = 65.0

[bootstrap.macos.keyboard]
key_repeat = 2
initial_key_repeat = 15
press_and_hold = false

[env]
'_'.path = "~/bin"
OPENCODE_ENABLE_EXA = "1"
OPENCODE_EXPERIMENTAL = "0"
OPENCODE_EXPERIMENTAL_MARKDOWN = "1"
OPENCODE_EXPERIMENTAL_FILEWATCHER = "1"
OPENCODE_EXPERIMENTAL_SCOUT = "1"
OPENCODE_ENABLE_EXPERIMENTAL_MODELS = "1"
OPENCODE_EXPERIMENTAL_CUSTOMIZE_SKILL = "1"
OPENCODE_EXPERIMENTAL_WORKSPACES = "1"
OPENCODE_EXPERIMENTAL_BACKGROUND_SUBAGENTS = "1"
OPENCODE_EXPERIMENTAL_NATIVE_LLM = "1"
OPENCODE_ENABLE_PARALLEL = "1"

CLAUDE_CODE_NO_FLICKER = true

OPENSPEC_NO_AUTO_CONFIG = "1"
OPENSPEC_NO_COMPLETIONS = "1"

OPT_OUT_INSTRUMENTATION = true
