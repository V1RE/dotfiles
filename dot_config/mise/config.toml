#:schema https://mise.jdx.dev/schema/mise.json

[tools]
"github:code-yeongyu/go-claude-code-comment-checker" = "latest"
"npm:@fsouza/prettierd" = "latest"
"npm:@vercel/before-and-after" = "latest"
"npm:agent-browser" = "latest"
"npm:codemogger" = "latest"
"npm:eas-cli" = "latest"
"npm:knip" = "latest"
"npm:mdrip" = "latest"
"npm:memelord" = "latest"
"npm:neovim" = "latest"
"npm:ocx" = "latest"
"npm:opensrc" = "latest"
"npm:skills" = "latest"
"npm:taze" = "latest"
"npm:trash-cli" = "latest"
"npm:turbo" = "latest"
"npm:vercel" = "latest"
bun = "latest"
codex = "latest"
graphite = "latest"
hcloud = "latest"
java = "24"
lazygit = "latest"
node = "24"
pnpm = "10"
usage = "latest"
uv = "latest"

[settings]
experimental = true
cargo_binstall = true
trusted_config_paths = ["~/Code/"]
vfox = false
lockfile = true
idiomatic_version_file_enable_tools = ["node"]

[settings.npm]
package_manager = "bun"

[settings.cargo]
binstall = true

[env]
'_'.path = "~/bin"
OPENCODE_EXPERIMENTAL = true
OPENCODE_EXPERIMENTAL_MARKDOWN = true
OPENCODE_EXPERIMENTAL_FILEWATCHER = true

OPENSPEC_NO_AUTO_CONFIG = "1"
OPENSPEC_NO_COMPLETIONS = "1"
