#:schema https://mise.jdx.dev/schema/mise.json

[tools]
"cargo:worktrunk" = "latest"
"github:can1357/oh-my-pi" = "latest"
"github:code-yeongyu/go-claude-code-comment-checker" = "latest"
"npm:@fsouza/prettierd" = "latest"
"npm:agent-browser" = "latest"
"npm:codemogger" = "latest"
"npm:eas-cli" = "latest"
"npm:fallow" = "latest"
"npm:kimaki" = "latest"
"npm:knip" = "latest"
"npm:neovim" = "latest"
"npm:ocx" = "latest"
"npm:opensrc" = "latest"
"npm:playwriter" = "latest"
"npm:poke" = "latest"
"npm:skills" = "latest"
"npm:taze" = "19.12.0"
"npm:trash-cli" = "latest"
"npm:turbo" = "latest"
"npm:wrangler" = "latest"
"npm:zele" = "latest"
aube = "latest"
bun = "latest"
codex = "latest"
graphite = "latest"
hcloud = "latest"
java = "26"
lazygit = "latest"
node = "24"
pitchfork = "latest"
pnpm = "latest"
usage = "latest"
uv = "latest"
vercel = "latest"

[settings]
experimental = true
trusted_config_paths = ["~/Code/"]
disable_backends = ["vfox"]
lockfile = true
idiomatic_version_file_enable_tools = ["node"]
minimum_release_age = "0"

[settings.npm]
package_manager = "aube"

[settings.cargo]
binstall = true

[settings.pipx]
uvx = true

[env]
'_'.path = "~/bin"
OPENCODE_ENABLE_EXA = "1"
OPENCODE_EXPERIMENTAL = "0"
OPENCODE_EXPERIMENTAL_MARKDOWN = "1"
OPENCODE_EXPERIMENTAL_FILEWATCHER = "1"
OPENCODE_EXPERIMENTAL_SCOUT = "1"
OPENCODE_ENABLE_EXPERIMENTAL_MODELS = "1"
OPENCODE_EXPERIMENTAL_CUSTOMIZE_SKILL = "1"
OPENCODE_EXPERIMENTAL_WORKSPACES = "1"
OPENCODE_EXPERIMENTAL_BACKGROUND_SUBAGENTS = "1"
OPENCODE_EXPERIMENTAL_NATIVE_LLM = "1"
OPENCODE_ENABLE_PARALLEL = "1"
CLAUDE_CODE_NO_FLICKER = true

OPENSPEC_NO_AUTO_CONFIG = "1"
OPENSPEC_NO_COMPLETIONS = "1"
